# Fly.io deployment. Single service serving the API and the built frontend.
#
# One-time setup:
#   fly launch --no-deploy        # or `fly apps create feature-request-board`
#   fly volumes create frb_data --size 1
#   fly deploy
#
# Note: SQLite on a single volume is fine for a demo. For real production or any
# horizontal scaling, switch APP_DATABASE_URL to managed Postgres (see README).

app = "feature-request-board"
primary_region = "iad"

[build]

[env]
  APP_FRONTEND_DIR = "frontend/dist"
  APP_DATABASE_URL = "sqlite:////data/app.db"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[mounts]]
  source = "frb_data"
  destination = "/data"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
